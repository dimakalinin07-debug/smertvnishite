<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Учёт перекупства</title>

</head>
<body>
    <!-- Вся ваша HTML-разметка остается без изменений -->
    <!-- ... -->

<script>
    // ВАЖНО: Укажите здесь URL, который вы получили после публикации Apps Script
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyDYZ4jEdncVrWKPx1KPlBnjWf6sqHLQ2I6M_gozgBSHfLtCDdYEQg_eUOG3NivywMazQ/exec'; 
    
    let transactions = [];
    let editId = null;

    async function loadTransactions() {
        try {
            const response = await fetch(SCRIPT_URL + '?action=getData');
            const data = await response.json();
            transactions = data;
            renderTable();
            recalcStats();
        } catch (error) {
            console.error('Ошибка загрузки:', error);
            alert('Не удалось загрузить данные. Проверьте подключение.');
        }
    }

    async function saveTransactions() {
        try {
            const response = await fetch(SCRIPT_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ action: 'saveData', records: transactions })
            });
            const result = await response.json();
            if (result.success) {
                alert('Данные сохранены!');
            } else {
                alert('Ошибка сохранения: ' + (result.error || 'Неизвестная ошибка'));
            }
        } catch (error) {
            console.error('Ошибка сохранения:', error);
            alert('Не удалось сохранить данные.');
        }
    }

    // Все остальные функции (renderTable, addTransaction, editTransaction, deleteTransaction, recalcStats) остаются без изменений.
    // ...

    // Инициализация
    window.onload = async () => {
        await loadTransactions();
        document.getElementById('addBtn').onclick = addTransaction;
        document.getElementById('clearAllBtn').onclick = clearAllTransactions;
        document.getElementById('cancelEditBtn').onclick = () => {
            editId = null;
            clearForm();
            document.getElementById('addBtn').innerText = '➕ Добавить';
            document.getElementById('cancelEditBtn').style.display = 'none';
        };
        // Устанавливаем сегодняшнюю дату
        const today = new Date().toISOString().slice(0,10);
        document.getElementById('dateInput').value = today;
    };
</script>
</body>
</html>
